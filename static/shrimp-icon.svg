<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <defs>
    <style>
      .shrimp-body { fill: #C9481B; }
      .shrimp-detail { fill: #C9481B; opacity: 0.8; }
    </style>
  </defs>

  <!-- Curved body segments -->
  <ellipse class="shrimp-body" cx="12" cy="10" rx="4" ry="3"/>
  <ellipse class="shrimp-body" cx="12" cy="14" rx="3.5" ry="2.8"/>
  <ellipse class="shrimp-body" cx="11.5" cy="17.5" rx="2.5" ry="2.5"/>

  <!-- Head -->
  <circle class="shrimp-body" cx="12" cy="7" r="2.5"/>

  <!-- Eye -->
  <circle fill="#F7F5F0" cx="13" cy="6.5" r="0.8"/>
  <circle class="shrimp-body" cx="13.2" cy="6.3" r="0.4"/>

  <!-- Antennae -->
  <path class="shrimp-detail" stroke="#C9481B" stroke-width="0.8" fill="none" stroke-linecap="round"
        d="M 11 6.5 Q 9 4 8 2"/>
  <path class="shrimp-detail" stroke="#C9481B" stroke-width="0.8" fill="none" stroke-linecap="round"
        d="M 13 6.5 Q 15 4 16 2"/>

  <!-- Walking legs (left side) -->
  <path class="shrimp-detail" stroke="#C9481B" stroke-width="0.6" fill="none" stroke-linecap="round"
        d="M 9.5 12 L 6 13"/>
  <path class="shrimp-detail" stroke="#C9481B" stroke-width="0.6" fill="none" stroke-linecap="round"
        d="M 9 15 L 5.5 16.5"/>

  <!-- Walking legs (right side) -->
  <path class="shrimp-detail" stroke="#C9481B" stroke-width="0.6" fill="none" stroke-linecap="round"
        d="M 14.5 12 L 18 13"/>
  <path class="shrimp-detail" stroke="#C9481B" stroke-width="0.6" fill="none" stroke-linecap="round"
        d="M 15 15 L 18.5 16.5"/>

  <!-- Tail fan -->
  <path class="shrimp-body" d="M 10.5 19.5 L 8.5 22 L 9 20 L 7 21.5 L 8.5 19.5 L 6.5 20 L 9 18.5 Z"/>
  <path class="shrimp-body" d="M 12 20 L 12 22.5"/>
  <path class="shrimp-body" d="M 13.5 19.5 L 15.5 22 L 15 20 L 17 21.5 L 15.5 19.5 L 17.5 20 L 15 18.5 Z"/>
</svg>
