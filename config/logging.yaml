# Python logging configuration (logging.config.dictConfig schema).
# Loaded by the top-level main.py before the server starts. Writes human-readable
# lines to the console and to logs/sldcs.log.

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s %(levelname)-8s %(name)s: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/sldcs.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  sldcs:
    level: INFO
    handlers: [console, file]
    propagate: false
  uvicorn.error:
    level: INFO
    handlers: [console, file]
    propagate: false
  uvicorn.access:
    level: INFO
    handlers: [console, file]
    propagate: false

root:
  level: INFO
  handlers: [console, file]
